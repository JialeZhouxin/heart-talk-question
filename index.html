<!DOCTYPE html>
<html lang="zh-CN" data-theme="forest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心语卡牌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-switch-wrap">
                <span class="theme-switch-label">主题风格</span>
                <div class="theme-selector" id="themeSelector" role="group" aria-label="主题风格切换">
                    <button class="filter-btn theme-option-btn active" id="themeToggleBtn" type="button" data-theme-choice="forest" aria-pressed="true">浅绿森林</button>
                    <button class="filter-btn theme-option-btn" type="button" data-theme-choice="warm" aria-pressed="false">暖纸治愈</button>
                    <button class="filter-btn theme-option-btn" type="button" data-theme-choice="dark" aria-pressed="false">夜间护眼</button>
                </div>
            </div>
            <h1>心语卡牌</h1>
            <p>用问题打开话匣子，让彼此更靠近一点</p>
        </header>

        <div class="filter-section">
            <h3>选择卡牌类型</h3>
            <div class="filter-buttons" id="categoryFilters">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="couple">情侣</button>
                <button class="filter-btn" data-category="friend">朋友</button>
                <button class="filter-btn" data-category="family">家庭</button>
                <button class="filter-btn" data-category="self">自我</button>
                <button class="filter-btn" data-category="clear_thinking">清晰思考</button>
            </div>
            <div class="filter-buttons" style="margin-top: 15px;" id="levelFilters">
                <button class="filter-btn active" data-level="all">全部难度</button>
                <button class="filter-btn" data-level="1">一级</button>
                <button class="filter-btn" data-level="2">二级</button>
                <button class="filter-btn" data-level="3">三级</button>
            </div>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="empty-state" id="emptyState">
                <p>点击"抽取卡牌"开始对话</p>
                <p>适合情侣、朋友、家庭与自我探索场景</p>
            </div>
            <div id="cardContent" style="display: none;">
                <div class="card-category" id="cardCategory"></div>
                <div class="card-level" id="cardLevel"></div>
                <div class="card-question" id="cardQuestion"></div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn" id="drawBtn">抽取卡牌</button>
            <button class="btn btn-secondary" id="saveBtn" style="display: none;">保存回答</button>
            <button class="btn btn-secondary" id="shareBtn" style="display: none;">分享</button>
            <button class="btn btn-secondary" id="statsBtn">📊 数据统计</button>
        </div>

        <!-- 卡牌包指示器 -->
        <div id="activePackIndicator"></div>

        <!-- 每日推荐 -->
        <div class="daily-card-section" id="dailyCardSection">
            <div id="dailyCardContainer"></div>
        </div>
            <div id="cardContent" style="display: none;">
                <div class="card-category" id="cardCategory"></div>
                <div class="card-level" id="cardLevel"></div>
                <div class="card-question" id="cardQuestion"></div>
            </div>
        </div>

        <!-- 每日推荐 -->
        <div class="daily-card-section" id="dailyCardSection">
            <div id="dailyCardContainer"></div>
        </div>

        <!-- 卡牌包指示器 -->
        <div id="activePackIndicator"></div>

        <div class="controls">
            <button class="btn" id="drawBtn">抽取卡牌</button>
            <button class="btn btn-secondary" id="saveBtn" style="display: none;">保存回答</button>
            <button class="btn btn-secondary" id="shareBtn" style="display: none;">分享</button>
            <button class="btn btn-secondary" id="statsBtn">📊 数据统计</button>
        </div>

        <!-- 功能入口 -->
        <div class="feature-buttons">
            <button class="filter-btn feature-btn" id="customCardBtn">✏️ 自定义卡牌</button>
            <button class="filter-btn feature-btn" id="cardPackBtn">📦 卡牌包</button>
        </div>

        <div class="history-section">
            <h3>
                对话历史
                <div class="history-header-actions">
                    <div id="historyExportContainer"></div>
                    <button class="filter-btn" id="clearHistoryBtn" style="font-size: 0.8rem; padding: 5px 12px;">清空</button>
                </div>
            </h3>
            <div id="historyFiltersContainer"></div>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <p>暂无对话记录</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="saveModal">
        <div class="modal-content">
            <h3>你的回答</h3>
            <p id="saveModalQuestion" style="margin-bottom: 15px; color: #6b7280;"></p>
            <textarea id="answerInput" placeholder="写下你的思考和感受..."></textarea>
            <button class="btn" id="confirmSaveBtn">保存</button>
            <button class="btn btn-secondary" id="cancelSaveBtn">取消</button>
        </div>
    </div>

    <div class="modal" id="shareModal">
        <div class="modal-content">
            <h3>分享这张卡牌</h3>
            <div class="share-preview" id="sharePreview">
                <div class="question" id="shareQuestion"></div>
                <div class="answer" id="shareAnswer"></div>
            </div>
            <div class="share-actions">
                <div class="share-actions-row">
                    <button class="btn" id="copyShareBtn">复制文本</button>
                    <button class="btn btn-secondary" id="generateImageBtn">生成分享图片</button>
                </div>
                <div class="share-actions-row">
                    <button class="btn btn-secondary" id="copyLinkBtn">复制分享链接</button>
                    <button class="btn btn-secondary" id="closeShareBtn">关闭</button>
                </div>
            </div>
            <div id="imagePreviewContainer" style="display: none; margin-top: 15px; text-align: center;">
                <img id="generatedImagePreview" class="share-image-preview" alt="分享卡片预览">
                <button class="btn" id="downloadImageBtn" style="margin-top: 10px;">下载图片</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>编辑回答</h3>
            <p id="editModalQuestion" style="margin-bottom: 15px; color: #6b7280; font-weight: 500;"></p>
            <textarea id="editAnswerInput" placeholder="编辑你的回答..."></textarea>
            <button class="btn" id="confirmEditBtn">保存修改</button>
            <button class="btn btn-secondary" id="cancelEditBtn">取消</button>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3>请确认操作</h3>
            <p id="confirmMessage" style="margin-bottom: 16px; color: #6b7280;"></p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="confirmCancelBtn">取消</button>
                <button class="btn" id="confirmOkBtn">确认</button>
            </div>
        </div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-content stats-modal-content">
            <h3>📊 数据统计</h3>
            <div id="statsContainer"></div>
            <button class="btn btn-secondary" id="closeStatsBtn" style="margin-top: 16px; width: 100%;">关闭</button>
        </div>
    </div>

    <!-- 自定义卡牌模态框 -->
    <div class="modal" id="customCardModal">
        <div class="modal-content custom-card-modal-content">
            <h3>✏️ 自定义卡牌</h3>
            <div id="customCardContainer"></div>
            <button class="btn btn-secondary" id="closeCustomCardBtn" style="margin-top: 16px; width: 100%;">关闭</button>
        </div>
    </div>

    <!-- 卡牌包模态框 -->
    <div class="modal" id="cardPackModal">
        <div class="modal-content card-pack-modal-content">
            <h3>📦 卡牌包</h3>
            <div id="cardPackContainer"></div>
            <button class="btn btn-secondary" id="closeCardPackBtn" style="margin-top: 16px; width: 100%;">关闭</button>
        </div>
    </div>

    <div class="modal" id="reportModal">
        <div class="modal-content stats-modal-content">
            <h3>📋 我的报告</h3>
            <div class="report-tabs" id="reportTabs">
                <button class="report-tab active" data-report-type="relationship">
                    💕 关系成长
                </button>
                <button class="report-tab" data-report-type="self-growth">
                    🌱 自我成长
                </button>
            </div>
            <div id="reportContainer"></div>
            <div class="share-actions" style="margin-top: 16px;">
                <button class="btn" id="downloadReportBtn">下载报告图片</button>
                <button class="btn btn-secondary" id="closeReportBtn">关闭</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <!-- 隐藏的图片分享卡片模板 -->
    <div id="shareCardTemplate" style="position: fixed; left: -9999px; top: 0; width: 600px; height: 800px; overflow: hidden;">
        <div class="share-card-visual">
            <div class="share-card-leaf share-card-leaf-1">🌿</div>
            <div class="share-card-leaf share-card-leaf-2">🍃</div>
            <div class="share-card-leaf share-card-leaf-3">🌱</div>
            <div class="share-card-header">
                <span class="share-card-logo">🌿</span>
                <span class="share-card-title">心语卡牌</span>
            </div>
            <div class="share-card-content">
                <div class="share-card-category" id="shareCardCategory"></div>
                <div class="share-card-question" id="shareCardQuestion"></div>
                <div class="share-card-answer-section" id="shareCardAnswerSection">
                    <div class="share-card-answer-label">我的回答</div>
                    <div class="share-card-answer" id="shareCardAnswer"></div>
                </div>
            </div>
            <div class="share-card-footer">
                <div class="share-card-slogan">用问题打开话匣子，让彼此更靠近一点</div>
                <div class="share-card-qrcode-text">扫码体验心语卡牌</div>
            </div>
        </div>
    </div>

    <script>
        (function loadAppScript() {
            const script = document.createElement('script');
            if (window.location.protocol === 'file:') {
                script.src = './src/app.bundle.js';
            } else {
                script.type = 'module';
                script.src = './src/main.js';
            }
            document.body.appendChild(script);
        })();
    </script>
</body>
</html>
