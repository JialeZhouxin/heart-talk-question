<!DOCTYPE html>

        }

            min-height: 300px;

            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card-container:hover {
            transform: translateY(-5px);
        }

        .card-level {

            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .level-1 {
            background: #fef3c7;
            color: #92400e;
        }

        .level-2 {
            background: #dbeafe;
            color: #1e40af;
        }

        .level-3 {
            background: #ede9fe;
            color: #5b21b6;
        }

        .card-question {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #1f2937;
        }

        .card-category {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 10px;
        }

            border: none;

            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;

        }

        .btn:hover {
            transform: translateY(-2px);

        }

        .btn:active {
            transform: translateY(0);
        }

            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-section {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .filter-section h3 {
            margin-bottom: 15px;
            color: #4c1d95;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;

        .filter-btn:hover,

            background: #667eea;
            color: white;
        }

        .history-section {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            margin-top: 20px;
        }

            margin-bottom: 15px;
            color: #4c1d95;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {

            overflow-y: auto;
        }

        .history-item {
            background: #f9fafb;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .history-item .question {

            color: #1f2937;

            font-size: 0.95rem;
            color: #4b5563;
            background: white;
            padding: 10px;
            border-radius: 8px;

            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;

            margin-bottom: 20px;
            color: #4c1d95;

            border-radius: 10px;
            font-size: 1rem;

            margin-bottom: 20px;
            font-family: inherit;

        .modal-content textarea:focus {

            border-color: #667eea;

            padding: 30px;
            border-radius: 15px;

            background: rgba(255,255,255,0.2);

            border-radius: 10px;
            text-align: left;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

            margin-bottom: 20px;
        }

            }

                font-size: 1.2rem;
            }

</head>

    <div class="container">

                <button class="filter-btn" data-category="friend">👫 朋友</button>
                <button class="filter-btn" data-category="family">👨‍👩‍👧 家庭</button>
                <button class="filter-btn" data-category="self">🧘 自我</button>
            </div>
            <div class="filter-buttons" style="margin-top: 15px;" id="levelFilters">
                <button class="filter-btn active" data-level="all">全部难度</button>
                <button class="filter-btn" data-level="1">⭐ Level 1</button>
                <button class="filter-btn" data-level="2">⭐⭐ Level 2</button>
                <button class="filter-btn" data-level="3">⭐⭐⭐ Level 3</button>
            </div>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="empty-state" id="emptyState">
                <p>🎴 点击"抽取卡牌"开始深度对话</p>
                <p>适合情侣、朋友、家人之间的真诚交流</p>
            </div>
            <div id="cardContent" style="display: none;">
                <div class="card-category" id="cardCategory"></div>
                <div class="card-level" id="cardLevel"></div>
                <div class="card-question" id="cardQuestion"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="drawBtn">🎴 抽取卡牌</button>
            <button class="btn btn-secondary" id="saveBtn" style="display: none;">💾 保存回答</button>
            <button class="btn btn-secondary" id="shareBtn" style="display: none;">📤 分享</button>
        </div>

        <div class="history-section">
            <h3>
                📜 对话历史
                <button class="filter-btn" id="clearHistoryBtn" style="font-size: 0.8rem; padding: 5px 12px;">清空</button>
            </h3>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <p>暂无对话记录</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 保存回答模态框 -->

        <div class="modal-content">
            <h3>💭 你的回答</h3>
            <p id="saveModalQuestion" style="margin-bottom: 15px; color: #6b7280;"></p>
            <textarea id="answerInput" placeholder="写下你的思考和感受..."></textarea>
            <button class="btn" id="confirmSaveBtn">保存</button>
            <button class="btn btn-secondary" id="cancelSaveBtn">取消</button>
        </div>
    </div>

            <div class="share-preview" id="sharePreview">

                <div class="answer" id="shareAnswer"></div>
            </div>
            <button class="btn" id="copyShareBtn">复制链接</button>
            <button class="btn btn-secondary" id="closeShareBtn">关闭</button>

            { id: 98, level: 3, category: 'couple', question: '你希望我如何在你困难时支持你？' },
            { id: 99, level: 3, category: 'couple', question: '你对婚姻和承诺的看法是什么？' },
            { id: 100, level: 3, category: 'couple', question: '你害怕失去什么？这个恐惧如何影响你的生活？' }
        ];

        // 状态管理
        let currentCard = null;
        let currentCategory = 'all';
        let currentLevel = 'all';
        let history = JSON.parse(localStorage.getItem('heartTalkHistory') || '[]');

        // DOM 元素
        const cardContainer = document.getElementById('cardContainer');
        const emptyState = document.getElementById('emptyState');
        const cardContent = document.getElementById('cardContent');
        const cardCategory = document.getElementById('cardCategory');
        const cardLevel = document.getElementById('cardLevel');
        const cardQuestion = document.getElementById('cardQuestion');
        const drawBtn = document.getElementById('drawBtn');
        const saveBtn = document.getElementById('saveBtn');
        const shareBtn = document.getElementById('shareBtn');
        const historyList = document.getElementById('historyList');
        const saveModal = document.getElementById('saveModal');
        const shareModal = document.getElementById('shareModal');
        const saveModalQuestion = document.getElementById('saveModalQuestion');
        const answerInput = document.getElementById('answerInput');
        const confirmSaveBtn = document.getElementById('confirmSaveBtn');
        const cancelSaveBtn = document.getElementById('cancelSaveBtn');
        const shareQuestion = document.getElementById('shareQuestion');
        const shareAnswer = document.getElementById('shareAnswer');
        const copyShareBtn = document.getElementById('copyShareBtn');
        const closeShareBtn = document.getElementById('closeShareBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const categoryFilters = document.getElementById('categoryFilters');
        const levelFilters = document.getElementById('levelFilters');

        // 分类名称映射
        const categoryNames = {
            'couple': '💕 情侣',
            'friend': '👫 朋友',
            'family': '👨‍👩‍👧 家庭',
            'self': '🧘 自我'
        };

        // 等级名称映射
        const levelNames = {
            '1': '⭐ 浅层',
            '2': '⭐⭐ 中层',
            '3': '⭐⭐⭐ 深层'
        };

        // 初始化
        function init() {
            renderHistory();
            setupEventListeners();
        }

        // 设置事件监听
        function setupEventListeners() {
            drawBtn.addEventListener('click', drawCard);
            saveBtn.addEventListener('click', openSaveModal);
            shareBtn.addEventListener('click', openShareModal);
            confirmSaveBtn.addEventListener('click', saveAnswer);
            cancelSaveBtn.addEventListener('click', closeSaveModal);
            closeShareBtn.addEventListener('click', closeShareModal);
            copyShareBtn.addEventListener('click', copyShareLink);
            clearHistoryBtn.addEventListener('click', clearHistory);

            // 分类筛选
            categoryFilters.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('#categoryFilters .filter-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                }
            });

            // 难度筛选
            levelFilters.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('#levelFilters .filter-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    currentLevel = e.target.dataset.level;
                }
            });

            // 点击模态框外部关闭
            saveModal.addEventListener('click', (e) => {
                if (e.target === saveModal) closeSaveModal();
            });
            shareModal.addEventListener('click', (e) => {
                if (e.target === shareModal) closeShareModal();
            });
        }

        // 抽取卡牌
        function drawCard() {
            let filteredCards = cards;

            if (currentCategory !== 'all') {
                filteredCards = filteredCards.filter(card => card.category === currentCategory);
            }

            if (currentLevel !== 'all') {
                filteredCards = filteredCards.filter(card => card.level.toString() === currentLevel);
            }

            if (filteredCards.length === 0) {
                alert('当前筛选条件下没有可用的卡牌，请调整筛选条件');
                return;
            }

            const randomIndex = Math.floor(Math.random() * filteredCards.length);
            currentCard = filteredCards[randomIndex];

            // 显示卡牌
            emptyState.style.display = 'none';
            cardContent.style.display = 'block';
            
            cardCategory.textContent = categoryNames[currentCard.category];
            cardLevel.textContent = levelNames[currentCard.level];
            cardLevel.className = 'card-level level-' + currentCard.level;
            cardQuestion.textContent = currentCard.question;

            // 显示按钮
            saveBtn.style.display = 'inline-block';
            shareBtn.style.display = 'inline-block';

            // 滚动到卡牌
            cardContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // 打开保存模态框
        function openSaveModal() {
            if (!currentCard) return;
            saveModalQuestion.textContent = currentCard.question;
            answerInput.value = '';
            saveModal.classList.add('active');
            answerInput.focus();
        }

        // 关闭保存模态框
        function closeSaveModal() {
            saveModal.classList.remove('active');
        }

        // 保存回答
        function saveAnswer() {
            const answer = answerInput.value.trim();
            if (!answer) {
                alert('请先写下你的回答');
                return;
            }

            const historyItem = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('zh-CN'),
                card: currentCard,
                answer: answer
            };

            history.unshift(historyItem);
            localStorage.setItem('heartTalkHistory', JSON.stringify(history));
            
            renderHistory();
            closeSaveModal();
            
            // 显示成功提示
            alert('✅ 回答已保存！');
        }

        // 打开分享模态框
        function openShareModal() {
            if (!currentCard) return;
            shareQuestion.textContent = currentCard.question;
            shareAnswer.textContent = answerInput.value || '（点击"保存回答"记录你的思考）';
            shareModal.classList.add('active');
        }

        // 关闭分享模态框
        function closeShareModal() {
            shareModal.classList.remove('active');
        }

        // 复制分享链接
        function copyShareLink() {
            const shareText = `💕 心语卡牌\n\n${currentCard.question}\n\n来自 心语卡牌 - 用问题打开话匣子`;
            navigator.clipboard.writeText(shareText).then(() => {
                alert('✅ 已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        // 渲染历史记录
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-state"><p>暂无对话记录</p></div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="timestamp">${item.timestamp}</div>
                    <span class="level-badge level-${item.card.level}">${levelNames[item.card.level]}</span>
                    <div class="question">${item.card.question}</div>
                    <div class="answer">${item.answer}</div>
                </div>
            `).join('');
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空所有对话记录吗？此操作不可恢复。')) {
                history = [];
                localStorage.removeItem('heartTalkHistory');
                renderHistory();
            }
        }

        // 启动应用
        init();
    </script>
</body>
</html>
